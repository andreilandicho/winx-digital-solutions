<!DOCTYPE html>
<html lang="en" ng-app="winxAdminApp">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Winx Digital Solutions</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body ng-controller="LoginController" class="login-body">

  <div class="login-container">
    <!-- Logo -->
    <div class="login-logo">
      <span class="brand-w">W</span>inx
      <span class="login-logo-sub">Admin Portal</span>
    </div>

    <div class="login-card">
      <div class="login-header">
        <div class="login-icon-wrap">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h1 class="login-title">Welcome back</h1>
        <p class="login-subtitle">Sign in to access the dashboard</p>
      </div>

      <form ng-submit="login()" novalidate>
        <div class="mb-3">
          <label class="form-label-admin">Email Address</label>
          <div class="input-wrap">
            <i class="bi bi-envelope input-icon"></i>
            <input
              type="email"
              class="form-control admin-input"
              ng-model="credentials.email"
              placeholder="admin@winxdigital.ph"
              required
              autofocus
            />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label-admin">Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input
              type="{{showPass ? 'text' : 'password'}}"
              class="form-control admin-input"
              ng-model="credentials.password"
              placeholder="••••••••"
              required
            />
            <button type="button" class="toggle-pass" ng-click="showPass = !showPass">
              <i class="bi" ng-class="showPass ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
        </div>

        <div class="login-error" ng-show="loginError">
          <i class="bi bi-exclamation-circle me-2"></i>{{loginError}}
        </div>

        <button type="submit" class="btn btn-login w-100" ng-disabled="loggingIn">
          <span ng-show="!loggingIn"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
          <span ng-show="loggingIn"><i class="bi bi-hourglass-split me-2"></i>Signing in...</span>
        </button>
      </form>

      <a href="../index.html" class="back-link">
        <i class="bi bi-arrow-left me-1"></i>Back to website
      </a>
    </div>

    <p class="login-footer-note">Winx Digital Solutions © 2026 · Admin access only</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/admin-login.js"></script>
</body>
</html>
